<svg xmlns="http://www.w3.org/2000/svg" width="120" height="28" viewBox="0 0 120 28" role="img" aria-label="Loading">
  <style>
    .dot { transform-origin: 14px 14px; animation: pulse 0.9s infinite ease-in-out; }
    .dot2 { animation-delay: 0.15s; }
    .dot3 { animation-delay: 0.3s; }
    @keyframes pulse { 0%, 80%, 100% { opacity: 0.25; } 40% { opacity: 1; } }
  </style>
  <circle class="dot" cx="20" cy="14" r="6" fill="#910029" />
  <circle class="dot dot2" cx="60" cy="14" r="6" fill="#910029" />
  <circle class="dot dot3" cx="100" cy="14" r="6" fill="#910029" />
</svg>
